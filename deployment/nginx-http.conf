# HTTP-only Nginx Configuration for BesaChain (Temporary until SSL is configured)

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;

    # Upstream backends
    upstream besachain_com {
        server besachain-com:80 max_fails=3 fail_timeout=30s;
    }

    upstream besachain_dex {
        server besachain-dex:80 max_fails=3 fail_timeout=30s;
    }

    upstream besachain_docs {
        server besachain-docs:80 max_fails=3 fail_timeout=30s;
    }

    upstream besachain_faucet {
        server besachain-faucet:80 max_fails=3 fail_timeout=30s;
    }

    upstream besachain_bridge {
        server besachain-bridge:80 max_fails=3 fail_timeout=30s;
    }

    upstream besachain_org {
        server besachain-org:80 max_fails=3 fail_timeout=30s;
    }

    # Default server - handles requests without Host header (including health checks)
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://besachain_com;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # besachain.com - Main Blockchain Site
    server {
        listen 80;
        server_name besachain.com www.besachain.com;

        location / {
            proxy_pass http://besachain_com;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # dex.besachain.com - DEX Application
    server {
        listen 80;
        server_name dex.besachain.com;

        location / {
            proxy_pass http://besachain_dex;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # docs.besachain.com - Documentation Site
    server {
        listen 80;
        server_name docs.besachain.com;

        location / {
            proxy_pass http://besachain_docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # faucet.besachain.com - Faucet Application
    server {
        listen 80;
        server_name faucet.besachain.com;

        location / {
            proxy_pass http://besachain_faucet;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # bridge.besachain.com - Bridge Application
    server {
        listen 80;
        server_name bridge.besachain.com;

        location / {
            proxy_pass http://besachain_bridge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # besachain.org - Foundation Site
    server {
        listen 80;
        server_name besachain.org www.besachain.org;

        location / {
            proxy_pass http://besachain_org;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
