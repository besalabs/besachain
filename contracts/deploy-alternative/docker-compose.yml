version: '3.8'

services:
  deploy:
    build: .
    container_name: besachain-l1-deploy
    environment:
      - L1_RPC_URL=${L1_RPC_URL:-http://host.docker.internal:1444}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - DEPLOYMENT_TARGET=live
    volumes:
      - ./.deployer:/deploy/.deployer
      - ./config:/deploy/config
      - ./intent.toml:/deploy/intent.toml:ro
    command: ["./deploy.sh"]
    networks:
      - besachain

  # Alternative: Use official op-deployer image
  deploy-official:
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-deployer:v0.6.0
    container_name: besachain-l1-deploy-official
    environment:
      - L1_RPC_URL=${L1_RPC_URL:-http://host.docker.internal:1444}
      - PRIVATE_KEY=${PRIVATE_KEY}
    volumes:
      - ./.deployer:/deployer
    command: >
      apply 
      --workdir /deployer
      --deployment-target live
      --l1-rpc-url $L1_RPC_URL
      --private-key $PRIVATE_KEY
    networks:
      - besachain
    profiles:
      - official

networks:
  besachain:
    driver: bridge
