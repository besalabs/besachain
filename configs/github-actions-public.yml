name: BesaChain CI/CD

on:
  push:
    branches: [ main, develop, 'feature/*', 'release/*' ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  GO_VERSION: '1.21'
  NODE_VERSION: '18'
  FOUNDRY_VERSION: 'nightly'

jobs:
  # ============================================================================
  # Lint and Format Checks
  # ============================================================================
  lint-go:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: ./node-client
          args: --timeout=10m

  lint-solidity:
    name: Lint Solidity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      
      - name: Run solhint
        run: |
          cd contracts
          npm install solhint
          npx solhint 'src/**/*.sol'

  lint-ts:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd sdk/js
          npm ci
      
      - name: Run ESLint
        run: |
          cd sdk/js
          npm run lint

  # ============================================================================
  # Build Jobs
  # ============================================================================
  build-node:
    name: Build Node Client
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
        exclude:
          - os: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          cd node-client
          make build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: besachain-${{ matrix.os }}-${{ matrix.arch }}
          path: node-client/build/bin/

  build-contracts:
    name: Build Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      
      - name: Build contracts
        run: |
          cd contracts
          forge build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contracts-artifacts
          path: contracts/out/

  build-sdk:
    name: Build SDKs
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sdk: [js, go, python]
    steps:
      - uses: actions/checkout@v4
      
      - name: Build ${{ matrix.sdk }} SDK
        run: |
          cd sdk/${{ matrix.sdk }}
          case "${{ matrix.sdk }}" in
            js)
              npm ci
              npm run build
              ;;
            go)
              go build ./...
              ;;
            python)
              pip install build
              python -m build
              ;;
          esac

  # ============================================================================
  # Test Jobs
  # ============================================================================
  test-go:
    name: Test Go Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Run tests
        run: |
          cd node-client
          make test
      
      - name: Generate coverage report
        run: |
          cd node-client
          go test -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./node-client/coverage.out
          flags: go
          name: go-coverage

  test-precompiles:
    name: Test Precompiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      
      - name: Test ML-DSA precompile
        run: |
          cd node-client/core/vm
          go test -v -run TestPrecompileMLDSA ./...

  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}
      
      - name: Run tests
        run: |
          cd contracts
          forge test -vvv
      
      - name: Run coverage
        run: |
          cd contracts
          forge coverage --report lcov
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./contracts/lcov.info
          flags: solidity
          name: solidity-coverage

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build-node, build-contracts]
    steps:
      - uses: actions/checkout@v4
      
      - name: Download node binary
        uses: actions/download-artifact@v4
        with:
          name: besachain-linux-amd64
          path: ./bin/
      
      - name: Make binary executable
        run: chmod +x ./bin/besachain
      
      - name: Run integration tests
        run: |
          cd scripts/tests
          ./run-integration-tests.sh

  # ============================================================================
  # Security Scans
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-severity high -quiet ./node-client/...'
      
      - name: Run Nancy (dependency check)
        run: |
          cd node-client
          go list -json -deps ./... | nancy sleuth
      
      - name: Run Slither (Solidity)
        uses: crytic/slither-action@v0.3.0
        with:
          target: 'contracts/'
          fail-on: 'high'

  # ============================================================================
  # Documentation
  # ============================================================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd docs
          npm ci
      
      - name: Build documentation
        run: |
          cd docs
          npm run build
      
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/build

  # ============================================================================
  # Release
  # ============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-node, test-go, test-contracts, security-scan]
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/
      
      - name: Create release archives
        run: |
          cd artifacts
          for dir in */; do
            [ -d "$dir" ] || continue
            zip -r "${dir%/}.zip" "$dir"
          done
      
      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================================
  # Docker
  # ============================================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-go, security-scan]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./node-client
          push: ${{ github.event_name == 'release' }}
          tags: |
            besachain/node:latest
            besachain/node:${{ github.sha }}
            ${{ github.event.release.tag_name != '' && format('besachain/node:{0}', github.event.release.tag_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
